<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
</head>
<body class="bg-slate-100 text-slate-800">
    <div class="min-h-screen">
        <nav class="bg-white border-b border-slate-200 sticky-top top-0 z-10">
            <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between item-center">
                <a href="index.html" class="text-green-700 font-bold text-lg ">Remind me</a>
                <div class="flex gap-4 text-sm">
                    <a href="index.html" class="text-green-700 font-bold border-b-2 pb-1">Dashboard</a>
                    <a href="./new-task.html" class="text-slate-500">New task</a>
                    <a href="./my-list.html" class="text-slate-500">My list</a>
                    <a href="./history.html" class="text-slate-500">History</a>
                    <a href="./settings.html" class="text-slate-500">Settings</a>
                </div>
            </div>
        </nav>
        <main class="max-w-5xl mx-auto px-4 py-8">
            <div class="max-w-md mx-auto">
                <div class="text-center mb-6">
                    <h2 class="font-bold text-2xl">Welcome,Xhenis</h2>
                    <p class="text-slate-500 text-sm">You have task to foucus on today.</p>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <div class="bg-white rounded-2xl p-4 text-center shadow-sm">
                        <p class="text-green-800 text-bold text-2xl">2</p>
                        <p class="text-slate-500 text-sm">today</p>
                    </div>      
                    <div class="bg-white rounded-2xl p-4 text-center shadow-sm">
                        <p class="text-blue-800 text-bold text-2xl">1</p>
                        <p class="text-slate-500 text-sm">done</p>
                    </div>                       
                    <div class="bg-white rounded-2xl p-4 text-center shadow-sm">
                        <p class="text-red-800 text-bold text-2xl">0</p>
                        <p class="text-slate-500 text-sm">overdue</p>
                    </div>     
                </div>
                <a href="./new-task.html" class="bg-green-500 full-w block text-center rounded-3xl text-white py-4 mb-6">+ Create task</a>
                <div class="flex justify-between items-center mb-3">
                    <h3>Today's Focus</h3>
                    <span class="text-green-700 bg-green-100 py-1 rounded-full px-2">3 tasks</span>
                </div>
                <div id="todaysTask">
                    <div class="bg-white rounded-2xl p-4 shadow-sm flex item-center gap-3">
                        <input type="checkbox" class="tesk-checkbox w-5 h-5 accent-green-600">
                        <div class="flex-1">
                            <h4 class="font-semibold">finish project proposal</h4>
                            <p class="text-xs text-slate-500">14:00 - Due by the and of the day</p>
                        </div>
                        <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">high</span>
                        <button class="delete-btn text-red-400 text">x</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
</body>
</html>
